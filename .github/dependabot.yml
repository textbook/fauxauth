---
version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    cooldown:
      default-days: 7
    directory: "/"
    open-pull-requests-limit: 10
    schedule:
      interval: "weekly"
    versioning-strategy: "increase"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
